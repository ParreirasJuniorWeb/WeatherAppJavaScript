name: Deploy Weather App

on:
  push:
    branches: [ main ] # Executa sempre que houver atualização na branch principal

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # Sobe todos os arquivos da raiz

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4